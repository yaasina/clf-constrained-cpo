# CLF Network Model Configuration
_target_: src.models.clf.CLFNetworkLightning
# Dimensions will be inferred from data during training
hidden_dim: 64
dropout_rate: 0.1
learning_rate: 0.001

# Self-supervised CLF loss hyperparameters
loss:
  # Weight for minimizing CLF value at equilibrium: α₁V_θ(0)
  alpha1: 1.0
  
  # Weight for minimizing relaxation variables: (α₂/B)∑ᵢr_i
  alpha2: 1000.0
  
  # Weight for enforcing negative Lie derivatives: (α₃/B)∑ᵢmax(L_f V_θ(x_i) + L_g V_θ(x_i)u_i, 0)
  alpha3: 10.0
  
  # Weight for ensuring CLF decreases over time: (α₄/B)∑ᵢmax((V_θ(x_i⁺) - V_θ(x_i))/Δt, 0)
  alpha4: 10.0