# Weights & Biases Logger Configuration
_target_: pytorch_lightning.loggers.WandbLogger
project: "clf-constrained-cpo"
name: ${experiment.name}
save_dir: ${hydra:runtime.output_dir}/logs
log_model: true
notes: ${experiment.description}
tags: ["${experiment.task}"]
group: ${experiment.name}
offline: false
job_type: "train"
reinit: true  # Ensures proper reinitialization for multiple runs
settings:
  start_method: "thread"  # Uses the newer service mode
config:
  experiment: ${experiment}
  model: ${model}
  optimizer: ${optimizer}
  seed: ${seed}
  training: ${training}