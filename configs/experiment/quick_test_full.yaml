# Quick test configuration for the full CLF-CPO pipeline
name: quick_test_full
description: "Quick test for incremental dynamics+CLF training"

env_name: "Pendulum-v1"

# Data / trajectory collection
data:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: ${seed}
  num_trajectories: 4         # Total trajectories to collect
  traj_length: 50             # Steps per trajectory
  buffer_size: 4              # Rolling window size (FIFO)
  trajectories_per_update: 2  # Collect 2 trajectories before each update
  epochs_per_trajectory: 5    # Epochs per dynamics+CLF update
  persistent_workers: true

# Dynamics model settings
dynamics:
  dt: 0.05
  normalize_data: true
  ensemble_size: 5
  hidden_dim: 64
  mc_dropout_enabled: false
  static_norm_k: 2.0
  dynamic_norm_c0: 0.01
  dynamic_norm_alpha: 0.01
  variance_buffer_size: 1000

# CLF settings
clf:
  hidden_dim: 64
  exp_const: 1.0
  loss:
    alpha1: 1.0
    alpha2: 1000
    alpha3: 10
    alpha4: 10
  qp_solver:
    lambda_param: 1.0

# Evaluation
evaluate_control: true
eval_grid: true
n_eval_samples: 400

# Training overrides
training:
  max_epochs: 50
  batch_size: 32
  num_workers: 4
  log_every_n_steps: 1
