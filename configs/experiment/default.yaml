# Default experiment configuration
name: default_experiment
description: "Default experiment configuration for dynamics learning"
task: dynamics_learning  # Options: dynamics_learning, clf_training

# Data configuration
data:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: ${seed}
  num_trajectories: 10     # Default number of trajectories to collect
  traj_length: 100         # Default length of each trajectory
  buffer_size: 10          # Default buffer size (keep all trajectories by default)
  epochs_per_trajectory: 5 # Default epochs to train on each trajectory
  persistent_workers: true # Use persistent workers for faster data loading

# Dynamics-specific settings
dynamics:
  dt: 0.05  # Time step for discrete integration
  normalize_data: true
  # Default variance normalization parameters
  static_norm_k: 1.0       # Scaling parameter for static normalization: 1-exp(-k*var)
  dynamic_norm_c0: 0.1     # Initial value for dynamic normalization parameter
  dynamic_norm_alpha: 0.01 # Learning rate for dynamic normalization parameter update
  variance_buffer_size: 1000 # Size of the buffer for variance history

# Training overrides
training:
  log_every_n_steps: 4     # Default log frequency for per-trajectory progress

# CLF-specific settings (used when task is clf_training)
clf:
  lambda_param: 1.0  # Weight on the relaxation variable
  exp_const: 1.0     # Exponential constant for CLF decrease rate
  qp_solver:
    action_limits: [-5.0, 5.0]
    max_retries: 3
    verbose: false