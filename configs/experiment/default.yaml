# Default experiment configuration
name: default_experiment
description: "CLF-CPO training on Pendulum-v1"

env_name: "Pendulum-v1"

# Data / trajectory collection
data:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: ${seed}
  num_trajectories: 10        # Total trajectories to collect
  traj_length: 100            # Steps per trajectory
  buffer_size: 10             # Rolling window size (FIFO)
  trajectories_per_update: 1  # Collect N trajectories before each dynamics+CLF update
  epochs_per_trajectory: 5    # Epochs to train on each update
  persistent_workers: true

# Dynamics model settings
dynamics:
  dt: 0.05
  normalize_data: true
  static_norm_k: 1.0
  dynamic_norm_c0: 0.1
  dynamic_norm_alpha: 0.01
  variance_buffer_size: 1000

# CLF settings
clf:
  hidden_dim: 64
  exp_const: 1.0
  loss:
    alpha1: 1.0   # V(equilibrium) = 0
    alpha2: 1.0  # Minimize QP relaxation
    alpha3: 1.0    # CLF decrease condition
    alpha4: 1.0    # Temporal decrease
  qp_solver:
    max_retries: 3
    verbose: false

# Training overrides
training:
  log_every_n_steps: 4

# Evaluation
evaluate_control: false
eval_grid: false
n_eval_samples: 1000
