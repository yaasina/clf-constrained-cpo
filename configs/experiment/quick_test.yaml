# Quick test configuration for dynamics learning with minimal data
name: quick_test
description: "Quick test configuration with minimal trajectories for fast dynamics learning"
task: dynamics_learning

# Data configuration
data:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: ${seed}
  num_trajectories: 5      # Reduced from 5 to make it faster
  traj_length: 50          # Reduced from 100 to make it faster
  buffer_size: 3           # Number of trajectories to keep in buffer (FIFO)
  epochs_per_trajectory: 5 # Number of epochs to train on each trajectory
  data_path: null          # Load from environment simulation
  persistent_workers: true # Add persistent workers for faster data loading

# Environment settings
env_name: "Pendulum-v1"    # Using pendulum as the test environment
# state_dim and action_dim are inferred from the environment automatically

# Dynamics-specific settings
dynamics:
  dt: 0.05                 # Time step for discrete integration
  normalize_data: true
  ensemble_size: 5         # Reduced from 3 to make it faster
  hidden_dim: 64           # Reduced from 64 to make it faster
  mc_dropout_enabled: false # Explicitly disable MC dropout during inference
  
  # Variance normalization parameters
  static_norm_k: 2.0       # Scaling parameter for static normalization: 1-exp(-k*var)
  dynamic_norm_c0: 0.01     # Initial value for dynamic normalization parameter
  dynamic_norm_alpha: 0.01 # Learning rate for dynamic normalization parameter update
  variance_buffer_size: 1000 # Size of the buffer for variance history

# Training overrides for faster execution
training:
  max_epochs: 50           # Now refers to total epochs (num_trajectories * epochs_per_trajectory)
  batch_size: 64           # Smaller batch size
  num_workers: 4           # Number of data loading workers
  log_every_n_steps: 2     # Log more frequently for better tracking of per-trajectory progress
  num_sanity_val_steps: 0  # Completely disable sanity checks to speed up trajectory processing